# Linear + Notion intentionally deferred post-pilot (OAuth-gated; not blocking v1).

primary_servers:
  - name: oci
    description: OpenCodeIntel — hybrid AST + BM25 + Cohere code retrieval (corresponding-author-authored; COI disclosed in RESEARCH_DESIGN.md §11)
    install: self-hosted
    repo: DevanshuNEU/lco-fork
    install_path: server-pool/oci
    git_sha: ea85ffdc99fbbdfe08b642eda8c199fcf972a9f8
    pinned_at: 2026-05-23
    auth: none
    reachability: 1
    coi: corresponding-author-authored
    domain_overlap: primary

  - name: github_mcp
    description: GitHub MCP — repo search, issues, PRs, files (Docker-distributed Go binary per official migration 2025; ghcr.io/github/github-mcp-server). Scoped to repos toolset + read-only at launch (see SERVER_POOL.md per-server scoping section).
    install: docker
    docker_image: ghcr.io/github/github-mcp-server
    docker_tag: latest
    image_digest: sha256:e3816a476a977cfb836e7d221510011436c654d11861db66ecfd826601aba6a4
    pinned_at: 2026-05-26
    auth: PAT
    env_passthrough: [GITHUB_PERSONAL_ACCESS_TOKEN]
    server_args: ["stdio", "--toolsets=repos", "--read-only"]
    reachability: 2
    domain_overlap: primary

