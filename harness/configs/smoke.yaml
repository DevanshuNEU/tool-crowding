# configs/smoke.yaml — Phase 2 step 2 smoke (2026-05-26)
#
# PURPOSE: plumbing validation, not science. The smoke proves that
# `tcrun run` walks the full path from config-load → preflight → cell
# enumeration → docker pool spawn → Anthropic API → MCP tool calls →
# Trial row write → oracle scoring → checkpoint + summary. The trials
# WILL score 0 on the oracle because git_mcp's docker container is
# launched without a git repo mounted, so the agent's git_log / git_grep
# tool calls return empty (smoke validates plumbing not science; first
# scientifically-valid smoke needs server-pool/ clones + a volume mount
# from track-2). The query's primary_server is set to git_mcp so the
# orchestrator's primary_server filter emits this trial; pre-filter the
# smoke deliberately misaligned (oci-targeted query on a git_mcp pool),
# but that path is now invalid and would halt with OrchestratorHalt.
#
# Cell math: 1 primary × 1 N × 1 query × 5 orderings × 1 rep = 5 trials.
# Cost ceiling ~$0.15 at Sonnet 4.6.

# Path-typed fields (content-hashed into run_id)
task_set: tasks/smoke.jsonl
oracle: tcrun/oracles/pass_v1.py
servers_pinned: tcrun/servers_pinned.yaml
descriptions: pool/descriptions.json
endpoints: models/endpoints.json
environment: environment.lock
padding_corpus: ../design/fake_tool_corpus.jsonl
embedder: models/embedder.json

# Non-path fields (value-hashed)
primary_servers:
  - git_mcp

distractors: []

N: [1]
runs_per_cell: 1
model: claude-sonnet-4-6
host: claude-desktop
seed: 42

tool_listing_strategy: full         # retriever-OFF
include_padded_n1_control: false    # no padded control for the smoke
include_no_mcp_baseline: false
include_random_tool_call_baseline: false
ragmcp_replication: false

out: results/smoke-001/
