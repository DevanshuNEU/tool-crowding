name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: harness/pyproject.toml

      - name: Install dependencies
        working-directory: harness
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,analysis]"

      - name: Lint with ruff
        working-directory: harness
        run: ruff check tcrun/ tests/
        continue-on-error: true  # non-blocking pre-v1.0; will gate at v0.2.0-pilot

      - name: Type check with pyright
        working-directory: harness
        run: pyright tcrun/
        continue-on-error: true  # pyright warnings are non-blocking pre-v1.0

      - name: Run pytest
        working-directory: harness
        run: pytest tests/ -v --no-header

  smoke-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        working-directory: harness
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run oracle smoke test (5 hand-curated cases)
        working-directory: harness
        run: pytest tests/test_pass_v1.py -v --no-header
